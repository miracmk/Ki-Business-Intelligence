networks:
  ki_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  npm_default:
    external: true
  n8n_n8n-net:
    external: true

volumes:
  ki_pg_data:
  ki_redis_data:
  ki_qdrant_data:
  ki_uploads:

services:

  ki_postgres:
    image: postgres:16-alpine
    container_name: ki_postgres
    restart: unless-stopped
    networks: [ki_net]
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ki_platform
    volumes:
      - ki_pg_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d ki_platform"]
      interval: 5s
      timeout: 5s
      retries: 12

  ki_redis:
    image: redis:7-alpine
    container_name: ki_redis
    restart: unless-stopped
    networks: [ki_net]
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - ki_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ki_qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: ki_qdrant
    restart: unless-stopped
    networks: [ki_net]
    volumes:
      - ki_qdrant_data:/qdrant/storage

  ki_api:
    image: node:24-alpine
    container_name: ki_api
    restart: unless-stopped
    working_dir: /app
    networks: [ki_net, npm_default, n8n_n8n-net]
    ports:
      - "3001:3001"
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - ./db:/app/db:ro
      - ./docker:/app/docker:ro
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./drizzle.config.ts:/app/drizzle.config.ts:ro
      - ./node_modules:/app/node_modules
      - ./frontend/dist:/app/frontend/dist:ro
      - ki_uploads:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      APP_URL: ${APP_URL}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgres://platform:${POSTGRES_PASSWORD}@ki_postgres:5432/ki_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@ki_redis:6379
      QDRANT_URL: http://ki_qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL}
      WA_PHONE_NUMBER_ID: ${WA_PHONE_NUMBER_ID}
      WA_ACCESS_TOKEN: ${WA_ACCESS_TOKEN}
      WA_WEBHOOK_VERIFY_TOKEN: ${WA_WEBHOOK_VERIFY_TOKEN}
      WA_OTP_TEMPLATE_NAME: ${WA_OTP_TEMPLATE_NAME}
      WA_OTP_TEMPLATE_LANG: ${WA_OTP_TEMPLATE_LANG}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      FRONTEND_DIST: /app/frontend/dist
    command: >
      sh -c "
        echo '⏳ Running migrations...' &&
        npx drizzle-kit migrate 2>&1 &&
        echo '🚀 Starting Ki BI API...' &&
        npx tsx src/server.ts
      "
    depends_on:
      ki_postgres:
        condition: service_healthy
      ki_redis:
        condition: service_healthy
      ki_qdrant:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"